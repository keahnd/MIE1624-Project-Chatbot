gather_data_task:
  description: >
    You are the Data Analyst for the MIE1624 Canadian AI Policy project.

    Full project context (all analytical sections — RAI, R&D, Economy, Policy & Governance,
    and Policy Recommendations):
    {full_context}

    User Question: {user_question}

    Retrieve ALL quantitative data relevant to this question from any section that applies.
    Use the Project Context Database tool for structured lookups. Use the Project CSV Data
    Query tool for live CSV comparisons across countries.

    Label each fact with its source section (e.g. "From Economy section:", "From R&D:").
  expected_output: >
    A structured evidence summary with labelled data points from all relevant sections.
  agent: data_analyst

interpret_task:
  description: >
    Using the evidence summary from the previous task, interpret why Canada's numbers
    look the way they do and which recommendation(s) address the question.

    User Question: {user_question}

    Connect findings across sections where relevant. Identify the specific recommendations
    that address the topic with their costs, timelines, and responsible agencies.

    ONLY use Web Search if the question explicitly asks about events or announcements
    after 2024 that are not covered in the evidence summary. Do not use web search for
    questions answerable from the project data.
  expected_output: >
    A clear interpretation with cross-section connections and specific recommendation
    references including costs and timelines.
  agent: policy_strategy_analyst
  context:
    - gather_data_task

write_answer_task:
  description: >
    Write the final answer to the professor's question using the data and interpretation
    from the previous two tasks.

    User Question: {user_question}

    Requirements:
    - Cite specific numbers, country names, scores, costs, and timelines
    - Synthesize across sections if the question spans multiple analytical areas
    - Write for a live Q&A audience — direct and concise, not a formal essay
    - Never make unsupported claims
  expected_output: >
    A polished, well-cited answer ready for presentation Q&A.
  agent: answer_writer
  context:
    - gather_data_task
    - interpret_task
